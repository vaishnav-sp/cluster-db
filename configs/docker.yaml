server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 10s
  environment: docker

cluster:
  node_id: node-1
  node_address: 0.0.0.0:9000
  replication_factor: 3
  heartbeat_interval: 5s
  failure_timeout: 30s
  discovery_port: 9001

storage:
  engine: memory
  data_directory: /data
  sync_writes: false
  max_open_files: 1000
  value_log_file_size: 1073741824
  compression: snappy

logging:
  level: info
  encoding: json
  development: false
  output_paths:
    - stdout
  error_output_paths:
    - stderr

metrics:
  enabled: true
  port: 9090

authentication:
  jwt_secret: change-me-in-production-key-32-chars
  issuer: clusterdb
  expiration: 24h

cache:
  enabled: false
  host: redis
  port: 6379
  ttl: 5m

ai:
  embedding_model: nomic-embed-text
  ollama_url: http://ollama:11434
  llm_model: llama3.1
  vector_dimension: 768
