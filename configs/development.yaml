server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 10s
  environment: development

cluster:
  node_id: node-1
  node_address: 127.0.0.1:9000
  replication_factor: 3
  heartbeat_interval: 5s
  failure_timeout: 30s
  discovery_port: 9001

storage:
  engine: memory
  data_directory: ./data
  sync_writes: true
  max_open_files: 1000
  value_log_file_size: 1073741824
  compression: snappy
  wal:
    enabled: true
    path: ./data/clusterdb.wal
    sync_on_write: false
  checkpoint_enabled: true
  checkpoint_interval: 1m
  checkpoint_size: 67108864
  wal_max_segment_size: 16777216
  wal_max_segments: 4

logging:
  level: info
  encoding: json
  development: false
  output_paths:
    - stdout
  error_output_paths:
    - stderr

metrics:
  enabled: true
  port: 9090

authentication:
  jwt_secret: change-me-in-production-key-32-chars
  issuer: clusterdb
  expiration: 24h

cache:
  enabled: false
  host: 127.0.0.1
  port: 6379
  ttl: 5m

ai:
  embedding_model: nomic-embed-text
  ollama_url: http://127.0.0.1:11434
  llm_model: llama3.1
  vector_dimension: 768
